robot_description: #values are in m,kg, rad
  base_link:
    pose:
      xyz: [0.0, 0.0, 0.0395]
      rpy: [0.0, 0.0, 0.0]

  wheel_right:
    pose:
      xyz: [0.12822912, 0.0000, 0.05349813]
