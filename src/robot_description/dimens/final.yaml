robot_description: #values are in m,kg, rad
base_link
  base_link:
    pose:
      xyz: [0.0, 0.0, 0.04]
      rpy: [0.0, 0.0, 0.0]

  wheel_right:
    pose:
      xyz: [-0.13059084, -0.05373383, 0.05412088]
      rpy: [1.57, 0.0, 0.0]

  wheel_left:
    pose:
      xyz: [0.1264188, 0.00012757, -0.03966397]
      rpy: [1.57, 0.0, 0.0]

  caster_front:
    pose:
      xyz: [0.0, -0.010, -0.04]
      rpy: [0.0, 0.0, 0.0]

  caster_back:
    pose:
      xyz: [0.0, 0.010, -0.04]
      rpy: [0.0, 0.0, 0.0]

  laser: #values in m,deg
    pose:
      xyz: [0.000, -0.015, 0.1298]
      rpy: [0, 0, 90] #xyz: (0, 0, 90)

  imu: #valeus in m,deg
    pose:
      xyz: [-0.075, 0.025, 0.0464015]
      rpy: [0, 0, 0]

  wheel: #values are in m,deg,kg
    seperation: 0.22448654
    radius_without_bumps: 0.103
    radius_with_bumps: 0.055
    #bumps is square with side being 0.002m and its length(extrude) is 21mm
    #bumps were then filleted to 0.25mm and were patterned around the wheel's outer surface 71 times(in circle path)



values_for_bumperbot_controller_config:
  simple_bumperbot_controller_yaml:
    pose_covariance_diagonal: [1.0e+3, 1.0e+3, 1.0e+3, 0.005, 0.005, 0.05]
    twist_covariance_diagonal: [1.0e+3, 1.0e+3, 1.0e+3, 0.01, 0.01, 0.1]


safety_stop_py:
  danger_distance: 0.18
  warning_distnance: 0.4

pure_pursuit_py:
  look_ahead_distance: 0.25

pd_motion_planner_py:
  step_size: 0.15

slam_toolbox_yaml:
  minimum_travel_distance: 0.2
  minimum_travel_heading: 0.2
  link_scan_maximum_distance: 1.0